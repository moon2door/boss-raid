<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boss Raid - Promo Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Audiowide&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-screen: #0d0322;
  --bg-deep: #050018;
  --magenta: #ff2bd6;
  --cyan: #00f0ff;
  --yellow: #ffe600;
  --orange: #ff8a3c;
  --red: #ff3060;
  --text: #f8eef8;
  --text-soft: #d3bce8;
  --text-muted: #8a6fc4;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  background: #02000a;
  color: var(--text);
  font-family: "VT323", "Noto Sans KR", monospace;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 40px 20px;
}

.spec {
  position: fixed;
  top: 14px;
  right: 18px;
  padding: 6px 10px;
  border: 2px solid var(--magenta);
  background: #100624;
  color: var(--cyan);
  font-family: "Press Start 2P", monospace;
  font-size: 10px;
  letter-spacing: 1px;
  z-index: 99;
}

.thumb {
  position: relative;
  width: min(1920px, calc(100vw - 80px));
  aspect-ratio: 16 / 9;
  border: 3px solid var(--magenta);
  background: var(--bg-screen);
  overflow: hidden;
  box-shadow: 0 0 80px rgba(255, 43, 214, 0.3);
}

/* ============== BACKGROUND ============== */
.bg-base {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 90%, rgba(255, 43, 214, 0.42), transparent 55%),
    radial-gradient(ellipse at 50% 40%, rgba(0, 240, 255, 0.18), transparent 60%),
    linear-gradient(180deg, #0a0220 0%, #18063a 50%, #0d0322 100%);
}

.bg-perspective {
  position: absolute;
  left: -10%;
  right: -10%;
  bottom: -4%;
  height: 58%;
  background:
    repeating-linear-gradient(90deg,
      transparent 0 7%,
      rgba(255, 43, 214, 0.9) 7% 7.12%);
  transform: perspective(900px) rotateX(74deg);
  transform-origin: 50% 100%;
  opacity: 0.55;
}

.bg-perspective::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg,
    transparent 0 14%,
    rgba(0, 240, 255, 0.7) 14% 14.18%);
}

.horizon {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 42%;
  height: 2px;
  background: var(--cyan);
  box-shadow:
    0 0 18px var(--cyan),
    0 0 40px rgba(0, 240, 255, 0.6);
}

.sun {
  position: absolute;
  left: 50%;
  bottom: 42%;
  transform: translate(-50%, 50%);
  width: 520px;
  height: 520px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 45%,
    var(--yellow) 0%,
    var(--orange) 38%,
    var(--magenta) 78%,
    transparent 100%);
  filter: blur(2px);
  opacity: 0.85;
}

.sun::before {
  content: "";
  position: absolute;
  inset: -50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 138, 60, 0.35), transparent 60%);
  filter: blur(20px);
}

.sun-lines {
  position: absolute;
  left: 50%;
  bottom: 42%;
  transform: translate(-50%, 50%);
  width: 520px;
  height: 260px;
  overflow: hidden;
}

.sun-lines::before,
.sun-lines::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  background: repeating-linear-gradient(0deg,
    transparent 0 24px,
    #0d0322 24px 32px);
}
.sun-lines::before { top: 50%; bottom: 0; }

.scanlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(0deg,
    rgba(0,0,0,0) 0 2px,
    rgba(0,0,0,0.2) 2px 4px);
  mix-blend-mode: multiply;
  opacity: 0.6;
}

.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 22%, transparent 70%, rgba(0,0,0,0.65)),
    linear-gradient(90deg, rgba(0,0,0,0.45), transparent 14%, transparent 86%, rgba(0,0,0,0.45));
}

/* ============== MAIN TITLE ============== */
.title-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 8;
  padding: 0 6%;
  text-align: center;
}

.kicker {
  display: inline-block;
  margin-bottom: 28px;
  padding: 8px 22px;
  border: 2px solid var(--cyan);
  color: var(--cyan);
  font-family: "Press Start 2P", monospace;
  font-size: 14px;
  letter-spacing: 6px;
  text-shadow: 0 0 10px var(--cyan);
}

.title {
  position: relative;
  font-family: "Audiowide", sans-serif;
  font-size: clamp(110px, 13.5vw, 260px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: 12px;
  margin: 0;
}

.title .layer {
  display: block;
  background: linear-gradient(180deg,
    #fff 0%,
    var(--yellow) 30%,
    var(--orange) 58%,
    var(--magenta) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(255, 43, 214, 0.6));
}

.title .shadow {
  position: absolute;
  inset: 0;
  display: block;
  color: transparent;
  -webkit-text-stroke: 3px rgba(0, 240, 255, 0.55);
  transform: translate(-6px, 6px);
  z-index: -1;
  filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.4));
}

.subtitle {
  margin-top: 30px;
  color: var(--cyan);
  font-family: "Audiowide", sans-serif;
  font-size: clamp(22px, 2.2vw, 38px);
  letter-spacing: 14px;
  text-shadow: 0 0 12px rgba(0, 240, 255, 0.7);
}

.tagline {
  margin-top: 18px;
  color: var(--text-soft);
  font-family: "Noto Sans KR", sans-serif;
  font-weight: 900;
  font-size: clamp(16px, 1.35vw, 22px);
  letter-spacing: 6px;
}
.tagline em {
  font-style: normal;
  color: var(--yellow);
  text-shadow: 0 0 10px rgba(255, 230, 0, 0.55);
}

/* ============== Bottom blink ============== */
.press-start {
  position: absolute;
  z-index: 9;
  left: 50%;
  bottom: 9%;
  transform: translateX(-50%);
  color: var(--yellow);
  font-family: "Press Start 2P", monospace;
  font-size: 14px;
  letter-spacing: 6px;
  text-shadow: 0 0 12px rgba(255, 230, 0, 0.7);
  animation: blink 1.1s steps(2) infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

/* ============== Corner brackets ============== */
.corner {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 3px solid var(--magenta);
  z-index: 4;
}
.corner.tl { top: 22px; left: 22px; border-right: none; border-bottom: none; }
.corner.tr { top: 22px; right: 22px; border-left: none; border-bottom: none; }
.corner.bl { bottom: 22px; left: 22px; border-right: none; border-top: none; }
.corner.br { bottom: 22px; right: 22px; border-left: none; border-top: none; }
</style>
</head>
<body>

<div class="spec">1920 x 1080 / 16:9</div>

<div class="thumb">
  <div class="bg-base"></div>
  <div class="sun"></div>
  <div class="sun-lines"></div>
  <div class="bg-perspective"></div>
  <div class="horizon"></div>

  <div class="title-wrap">
    <div>
      <div class="kicker">PRESENTING</div>
      <h1 class="title">
        <span class="shadow">BOSS RAID</span>
        <span class="layer">BOSS RAID</span>
      </h1>
    </div>
  </div>

  <div class="press-start">&gt;&gt; PRESS SPACE TO BEGIN &lt;&lt;</div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="vignette"></div>
  <div class="scanlines"></div>
</div>

</body>
</html>
